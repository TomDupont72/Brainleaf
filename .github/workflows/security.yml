name: Security checks

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gitleaks:
    name: Secret scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2

  npm-audit:
    name: Dependency audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Audit backend
        run: |
          cd backend
          npm ci
          npm audit --audit-level=high

      - name: Audit frontend
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high