name: Deploy to VPS

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install & build frontend
        run: |
          npm ci
          npm run build

      - name: Install & build backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.10.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Upload frontend dist
        run: |
          rsync -az --delete dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/frontend/

      - name: Upload backend artifacts
        run: |
          rsync -az --delete backend/dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/api/dist/
          rsync -az backend/prisma/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/api/prisma/
          rsync -az backend/package.json backend/package-lock.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/api/

      - name: Install prod deps + prisma generate + restart
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /var/www/brainleaf/api

            npm ci

            # Prisma client generation (important)
            npx prisma generate

            npm prune --omit=dev

            sudo systemctl restart brainleaf-api
            sudo systemctl reload nginx || true
          EOF

      - name: Upload worker source
        run: |
          rsync -az --delete worker/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/worker/

      - name: Build and restart worker container
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /var/www/brainleaf

            docker build --no-cache -t brainleaf-worker ./worker
            docker rm -f brainleaf-worker || true
            docker run -d \
              --name brainleaf-worker \
              --network brainleaf-network \
              --restart always \
              --env-file /etc/brainleaf-worker.env \
              brainleaf-worker
          EOF

      - name: Health check
        run: |
          for i in {1..30}; do
            curl -fsS https://brainleaf.tomdupont.fr/api/health && break
            sleep 1
          done
          curl -fsS https://brainleaf.tomdupont.fr/api/health
