name: Deploy to VPS

on:
  push:
    branches: ["main"]

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # Installe à la racine (mono-repo / workspace / scripts root)
      - name: Install deps (root)
        run: npm ci

      # Build frontend depuis la racine
      # (doit produire un dossier dist/ à la racine comme chez toi)
      - name: Build frontend (root)
        run: npm run build

      # Build backend (si tu as un script root qui le fait)
      # Sinon commente cette étape et on build dans backend/ directement
      - name: Build backend (root)
        run: npm run build:api

      - name: Add SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      # Upload frontend (dist à la racine)
      - name: Upload frontend dist
        run: |
          rsync -az --delete dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/frontend/

      # Upload backend build + prisma + package files
      - name: Upload backend artifacts
        run: |
          rsync -az --delete backend/dist/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/api/dist/
          rsync -az backend/prisma/ ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/api/prisma/
          rsync -az backend/package.json backend/package-lock.json ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/var/www/brainleaf/api/

      - name: Install prod deps + prisma generate + restart
        run: |
          ssh ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'
            set -e
            cd /var/www/brainleaf/api

            npm ci --omit=dev

            # Prisma client generation (important)
            npx prisma generate

            sudo systemctl restart brainleaf-api
            sudo systemctl reload nginx || true
          EOF

      - name: Health check
        run: |
          curl -fsS https://brainleaf.tomdupont.fr/api/health