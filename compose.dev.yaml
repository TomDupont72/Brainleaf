services:
  backend:
    build: ./backend
    container_name: brainleaf-backend
    ports:
      - "127.0.0.1:8000:8000"
    env_file:
      - ./backend/.env
    networks:
      - default
      - dev-infrastructure
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        NGINX_CONF: nginx.dev.conf
    container_name: brainleaf-frontend
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - backend
    networks:
      - default
    restart: unless-stopped

  worker:
    build: ./worker
    container_name: brainleaf-worker
    env_file:
      - ./worker/.env
    environment:
      BACKEND_URL: http://backend:8000
      REDIS_HOST: dev-redis
      REDIS_PORT: 6379
    networks:
      - default
      - dev-infrastructure
    restart: unless-stopped

networks:
  dev-infrastructure:
    external: true