services:
  backend:
    image: ghcr.io/tomdupont72/brainleaf-backend:latest
    container_name: brainleaf-backend
    env_file:
      - /etc/brainleaf-api.env
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - shared-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/tomdupont72/brainleaf-frontend:latest
    container_name: brainleaf-frontend
    ports:
      - "127.0.0.1:5175:80"
    depends_on:
      - backend
    restart: unless-stopped

  worker:
    image: ghcr.io/tomdupont72/brainleaf-worker:latest
    container_name: brainleaf-worker
    env_file:
      - /etc/brainleaf-worker.env
    environment:
      BACKEND_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - shared-network
    restart: unless-stopped

networks:
  shared-network:
    external: true
