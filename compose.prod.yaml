services:
  backend:
    image: ghcr.io/tomdupont72/brainleaf-backend:${APP_VERSION:-latest}
    container_name: brainleaf-backend
    env_file:
      - /etc/brainleaf-api.env
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - brainleaf
      - infrastructure
    restart: unless-stopped

  frontend:
    image: ghcr.io/tomdupont72/brainleaf-frontend:${APP_VERSION:-latest}
    container_name: brainleaf-frontend
    ports:
      - "127.0.0.1:5175:80"
    networks:
      - brainleaf
    restart: unless-stopped

  worker:
    image: ghcr.io/tomdupont72/brainleaf-worker:${APP_VERSION:-latest}
    container_name: brainleaf-worker
    env_file:
      - /etc/brainleaf-worker.env
    networks:
      - brainleaf
      - infrastructure
    restart: unless-stopped

networks:
  brainleaf:
  infrastructure:
    external: true